plugins {
    id 'java'
    id 'application'
}

group = 'lab.pricing'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
}

test {
    useJUnitPlatform()
}

application {
    mainClass = 'lab.pricing.App'
}
